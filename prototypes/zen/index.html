<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&family=Zen+Kaku+Gothic+New:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;background:#f2efe8;color:#2c2820;overflow-x:hidden;line-height:1.8}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.6' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

.hero{text-align:center;padding:100px 20px 50px;position:relative}
.hero::before{content:'\u4E00\u77B3';position:absolute;top:40px;left:50%;transform:translateX(-50%);font-family:'Noto Serif JP',serif;font-size:3rem;color:#c8c0b0;opacity:.3;letter-spacing:.3em}
.hero h1{font-family:'Noto Serif JP',serif;font-size:2.2rem;font-weight:300;letter-spacing:.25em;color:#2c2820}
.hero p{font-size:.75rem;letter-spacing:.4em;text-transform:uppercase;color:#a09888;margin-top:8px}
.hero .spacer{width:40px;height:1px;background:#c8c0b0;margin:16px auto}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:10px 0 60px}
.gallery-item{position:relative;cursor:pointer;background:transparent;transition:transform .5s ease;padding:4px}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .6s ease;filter:contrast(.95) saturate(.85)}
.gallery-item::after{content:'';position:absolute;inset:4px;border:1px solid rgba(200,192,176,.3);pointer-events:none;transition:.4s;opacity:0}
.gallery-item:hover::after{opacity:1}
.gallery-item:hover{transform:translateY(-3px)}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(44,40,32,.92);display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox::before{content:'\u4E00\u77B3';position:absolute;top:30px;left:50%;transform:translateX(-50%);font-family:'Noto Serif JP',serif;font-size:1.6rem;color:rgba(255,255,255,.08);letter-spacing:.3em}
.lightbox img{max-width:88vw;max-height:85vh;object-fit:contain;border:1px solid rgba(255,255,255,.06)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.04);color:#b8b0a0;border:1px solid rgba(255,255,255,.06);font-size:1.3rem;width:44px;height:44px;cursor:pointer;transition:.3s;font-family:'Zen Kaku Gothic New',sans-serif}
.lightbox .nav:hover{background:rgba(255,255,255,.1);color:#f2efe8}
.lightbox .prev{left:16px}
.lightbox .next{right:16px}
.lightbox .close{position:absolute;top:16px;right:20px;background:none;border:none;color:#8a8070;font-size:1.6rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#f2efe8}
.lightbox .counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:.65rem;letter-spacing:.2em;font-family:'Noto Serif JP',serif}

.footer{text-align:center;padding:40px 0 30px;color:#b0a898;font-size:.75rem;border-top:1px solid #e0d8cc}
.footer a{color:#8a8070;text-decoration:none}
.footer a:hover{color:#2c2820}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>Gordon Rudman</h1>
    <div class="spacer"></div>
    <p>Photography</p>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  c.appendChild(img);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent='\u5E55 '+(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
