<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-weight:300;background:#0c0b0a;color:#e0d8d0;overflow-x:hidden;line-height:1.7}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,170,100,.03),transparent 70%);pointer-events:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

.hero{text-align:center;padding:80px 20px 50px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:linear-gradient(90deg,transparent,#c8a860,transparent)}
.hero .emblem{font-size:.6rem;letter-spacing:.5em;color:#c8a860;margin-bottom:20px;font-weight:400;text-transform:uppercase}
.hero h1{font-family:'Playfair Display',serif;font-size:3.8rem;font-weight:400;color:#f0e8e0;letter-spacing:.04em}
.hero p{font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;color:#8a8078;margin-top:8px;font-weight:400}
.hero .gold-line{width:40px;height:1px;background:#c8a860;margin:20px auto 0}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:30px 0 60px}
.gallery-item{position:relative;cursor:pointer;background:#141210;border:1px solid rgba(200,168,96,.08);transition:all .4s ease;padding:8px}
.gallery-item::before{content:'';position:absolute;inset:-1px;border:1px solid rgba(200,168,96,.06);pointer-events:none;transition:.4s;opacity:0}
.gallery-item:hover::before{opacity:1}
.gallery-item:hover{border-color:rgba(200,168,96,.2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3),0 0 30px rgba(200,168,96,.02)}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .6s ease;filter:saturate(.9) brightness(.95)}
.gallery-item .plate{position:absolute;bottom:8px;left:8px;right:8px;padding:14px;background:linear-gradient(transparent,rgba(12,11,10,.8));display:flex;justify-content:space-between;font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(224,216,208,.3);pointer-events:none;opacity:0;transition:.4s}
.gallery-item:hover .plate{opacity:1}
.gallery-item .plate .gold{color:#c8a860}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(12,11,10,.95);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px)}
.lightbox img{max-width:86vw;max-height:84vh;object-fit:contain;box-shadow:0 20px 80px rgba(0,0,0,.5)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(200,168,96,.06);color:#c8a860;border:1px solid rgba(200,168,96,.1);font-size:1.5rem;width:48px;height:48px;cursor:pointer;transition:.3s}
.lightbox .nav:hover{background:rgba(200,168,96,.15)}
.lightbox .prev{left:20px}
.lightbox .next{right:20px}
.lightbox .close{position:absolute;top:20px;right:24px;background:none;border:none;color:rgba(200,168,96,.3);font-size:2rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#c8a860}
.lightbox .counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(200,168,96,.15);font-size:.65rem;letter-spacing:.15em}

.footer{text-align:center;padding:40px 0 30px;color:#5a5550;font-size:.7rem;border-top:1px solid rgba(200,168,96,.06)}
.footer a{color:#8a8078;text-decoration:none}
.footer a:hover{color:#c8a860}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="emblem">&#9679; Established MMXXVI &#9679;</div>
    <h1>Gordon Rudman</h1>
    <p>Photography</p>
    <div class="gold-line"></div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const p=document.createElement('div');p.className='plate';p.innerHTML='<span>Edition I</span><span class="gold">'+(i+1)+' / '+TOTAL+'</span>';
  c.append(img,p);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent='No. '+(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
