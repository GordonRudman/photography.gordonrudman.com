<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nordic — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,600&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',sans-serif;font-weight:300;background:#fafaf7;color:#2d3436;overflow-x:hidden;line-height:1.7}
.container{max-width:1160px;margin:0 auto;padding:0 24px}

.hero{display:flex;flex-direction:column;align-items:center;padding:70px 20px 30px;text-align:center}
.hero .avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;margin-bottom:20px;filter:grayscale(100%);opacity:.8}
.hero h1{font-family:'Libre Baskerville',serif;font-size:2rem;font-weight:400;color:#2d3436;margin-bottom:4px}
.hero p{font-size:.8rem;color:#b0b8b4;letter-spacing:.2em;text-transform:uppercase;font-weight:600}
.hero .pill{display:inline-block;margin-top:16px;padding:6px 20px;background:#e8ece9;border-radius:20px;font-size:.7rem;color:#636e72;font-weight:600;letter-spacing:.05em}
.hero .pill i{font-family:'Libre Baskerville',serif;font-style:italic;font-weight:400}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;padding:20px 0 60px}
.gallery-item{position:relative;cursor:pointer;border-radius:16px;overflow:hidden;background:#f0f2ef;transition:transform .3s ease,box-shadow .3s;box-shadow:0 2px 8px rgba(0,0,0,.02)}
.gallery-item:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.06)}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;border-radius:16px;filter:saturate(.9)}
.gallery-item .card-footer{padding:12px 14px;display:flex;justify-content:space-between;font-size:.65rem;color:#b0b8b4;font-weight:600;letter-spacing:.05em;text-transform:uppercase}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(250,250,247,.93);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(16px)}
.lightbox img{max-width:88vw;max-height:86vh;object-fit:contain;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.06)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:#fff;color:#2d3436;border:none;font-size:1.4rem;width:44px;height:44px;border-radius:50%;cursor:pointer;transition:.2s;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.lightbox .nav:hover{background:#e8ece9}
.lightbox .prev{left:20px}
.lightbox .next{right:20px}
.lightbox .close{position:absolute;top:20px;right:24px;background:none;border:none;color:#b0b8b4;font-size:1.8rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#2d3436}
.lightbox .counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#d0d6d2;font-size:.7rem;letter-spacing:.1em}

.footer{text-align:center;padding:40px 0;color:#d0d6d2;font-size:.75rem}
.footer a{color:#b0b8b4;text-decoration:none}
.footer a:hover{color:#2d3436}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <img class="avatar" src="../../photos/avif/hero.avif" alt="">
    <h1>Gordon Rudman</h1>
    <p>Photography</p>
    <div class="pill"><i>&#9998;</i> Available for commissions</div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const f=document.createElement('div');f.className='card-footer';f.innerHTML='<span>&#9679; '+(i+1)+'</span><span>&#8599;</span>';
  c.append(img,f);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery-item img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
