<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bohemian — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;600&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;font-weight:300;background:#f5eade;color:#3d3038;overflow-x:hidden;line-height:1.7}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L55 30L30 55L5 30Z' fill='%23d4a888' fill-opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

.hero{padding:60px 20px 30px;text-align:center;position:relative}
.hero .mandala{display:flex;justify-content:center;gap:6px;margin-bottom:16px;opacity:.3}
.hero .mandala span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#c08070;transition:.3s}
.hero .mandala span:nth-child(2n){background:#d4a888;width:10px;height:10px}
.hero h1{font-family:'Crimson Pro',serif;font-size:3rem;font-weight:400;color:#3d3038}
.hero p{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:#c08070;margin-top:4px;font-weight:500}
.hero .divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px auto 0;max-width:200px}
.hero .divider span{flex:1;height:1px;background:linear-gradient(90deg,transparent,#d4a888,transparent)}
.hero .divider i{color:#d4a888;font-style:normal;font-size:.6rem}

.gallery{column-count:2;column-gap:16px;padding:10px 0 50px}
.gallery-item{position:relative;margin-bottom:16px;cursor:pointer;break-inside:avoid;border-radius:20px 4px 20px 4px;overflow:hidden;background:#f0e0d0;transition:transform .4s ease;box-shadow:0 2px 12px rgba(61,48,56,.06)}
.gallery-item:hover{transform:translateY(-3px) rotate(-.3deg)}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;filter:saturate(1.1) brightness(1.02)}
.gallery-item .tassel{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#d4a888,#c08070);opacity:0;transition:.3s;box-shadow:0 0 8px rgba(192,128,112,.3)}
.gallery-item:hover .tassel{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,48,56,.9);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.lightbox img{max-width:86vw;max-height:84vh;object-fit:contain;border-radius:24px 4px 24px 4px;box-shadow:0 20px 60px rgba(0,0,0,.2);border:2px solid rgba(255,255,255,.04)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(245,234,222,.08);color:#f5eade;border:none;font-size:1.4rem;width:44px;height:44px;border-radius:50%;cursor:pointer;transition:.2s}
.lightbox .nav:hover{background:rgba(245,234,222,.2)}
.lightbox .prev{left:16px}
.lightbox .next{right:16px}
.lightbox .close{position:absolute;top:16px;right:20px;background:none;border:none;color:#a08070;font-size:1.8rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#f5eade}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:.65rem}

.footer{text-align:center;padding:30px;color:#c0a898;font-size:.7rem;border-top:1px solid #e8d8c8}
.footer a{color:#b09080;text-decoration:none}
.footer a:hover{color:#3d3038}

@media(min-width:700px){.gallery{column-count:3}}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="mandala"><span></span><span></span><span></span><span></span><span></span></div>
    <h1>Gordon Rudman</h1>
    <p>Photography</p>
    <div class="divider"><span></span><i>&#9830;</i><span></span></div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const t=document.createElement('div');t.className='tassel';
  c.append(img,t);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
