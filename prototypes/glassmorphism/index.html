<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;font-weight:200;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#e8e4f0;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(100,80,200,.08),transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(200,80,150,.06),transparent 60%);pointer-events:none;z-index:0}
.container{max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1}

.hero{text-align:center;padding:60px 20px 40px}
.hero .glass-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:50px 30px;display:inline-block;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.hero h1{font-size:2.6rem;font-weight:200;letter-spacing:.08em;color:#fff;margin-bottom:4px}
.hero p{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:400}
.hero .orbital{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,rgba(100,80,200,.4),rgba(200,80,150,.4));filter:blur(20px);margin:-30px auto 0;position:relative;top:-10px}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding:20px 0 60px}
.gallery-item{position:relative;cursor:pointer;border-radius:20px;overflow:hidden;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);transition:transform .4s ease,box-shadow .4s;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.gallery-item:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 12px 40px rgba(0,0,0,.2);border-color:rgba(255,255,255,.12)}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;border-radius:20px 20px 0 0}
.gallery-item .gloss{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 50%);pointer-events:none;border-radius:20px;opacity:0;transition:.4s}
.gallery-item:hover .gloss{opacity:1}
.gallery-item .glass-label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:rgba(255,255,255,.03);backdrop-filter:blur(8px);font-size:.55rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.04);opacity:0;transition:.3s}
.gallery-item:hover .glass-label{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,12,41,.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.lightbox img{max-width:84vw;max-height:82vh;object-fit:contain;border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.06);backdrop-filter:blur(10px);color:#e8e4f0;border:1px solid rgba(255,255,255,.06);font-size:1.4rem;width:48px;height:48px;border-radius:50%;cursor:pointer;transition:.3s}
.lightbox .nav:hover{background:rgba(255,255,255,.12);box-shadow:0 0 30px rgba(100,80,200,.1)}
.lightbox .prev{left:20px}
.lightbox .next{right:20px}
.lightbox .close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.4);font-size:1.4rem;width:44px;height:44px;border-radius:50%;cursor:pointer;transition:.2s}
.lightbox .close:hover{background:rgba(255,255,255,.12);color:#fff}
.lightbox .counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:.65rem;letter-spacing:.15em}

.footer{text-align:center;padding:30px;color:rgba(255,255,255,.15);font-size:.7rem}
.footer a{color:rgba(255,255,255,.2);text-decoration:none}
.footer a:hover{color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="glass-card">
      <div class="orbital"></div>
      <h1>Gordon Rudman</h1>
      <p>Photography</p>
    </div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const gl=document.createElement('div');gl.className='gloss';
  const lbl=document.createElement('div');lbl.className='glass-label';lbl.textContent='\u25C6 '+(i+1)+' / '+TOTAL;
  c.append(img,gl,lbl);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
