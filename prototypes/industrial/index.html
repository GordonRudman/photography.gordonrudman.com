<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;font-weight:300;background:#2a2a28;color:#c8c4be;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.008) 40px,rgba(255,255,255,.008) 41px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.008) 40px,rgba(255,255,255,.008) 41px);pointer-events:none;z-index:9999}
.container{max-width:1300px;margin:0 auto;padding:0}

.header{background:#1e1e1c;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #555;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.header .site-name{font-weight:700;color:#e8e4de;letter-spacing:.2em}
.header .meta{color:#787470}

.hero{position:relative;height:55vh;min-height:320px;overflow:hidden;margin:0;border-bottom:3px solid #555}
.hero img{width:100%;height:100%;object-fit:cover;filter:grayscale(80%) contrast(1.2) brightness(.7)}
.hero .hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(30,30,28,.85),transparent 60%);display:flex;align-items:center}
.hero .hero-content{padding:50px;max-width:500px}
.hero .hero-content .tag{display:inline-block;background:#555;color:#e8e4de;padding:2px 10px;font-size:.55rem;font-weight:700;letter-spacing:.15em;margin-bottom:16px;text-transform:uppercase}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:3.5rem;font-weight:300;color:#e8e4de;letter-spacing:-.02em;line-height:1;margin-bottom:8px}
.hero p{font-size:.8rem;color:#98948e;font-weight:300}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:0;padding:0}
.gallery-item{position:relative;cursor:pointer;overflow:hidden;background:#333330;border-right:1px solid #3a3a38;border-bottom:1px solid #3a3a38;transition:.2s}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;filter:grayscale(60%) contrast(1.1);transition:filter .4s,opacity .5s,transform .4s}
.gallery-item:hover img{filter:grayscale(0%) contrast(1);transform:scale(1.03)}
.gallery-item .ref{position:absolute;bottom:8px;left:8px;font-size:.5rem;color:rgba(200,196,190,.5);font-weight:500;letter-spacing:.1em;background:rgba(30,30,28,.7);padding:2px 6px;opacity:0;transition:.3s}
.gallery-item:hover .ref{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,20,18,.97);display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox img{max-width:88vw;max-height:86vh;object-fit:contain;border:1px solid rgba(255,255,255,.05)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.03);color:#98948e;border:1px solid rgba(255,255,255,.05);font-size:1.4rem;width:48px;height:48px;cursor:pointer;transition:.2s}
.lightbox .nav:hover{background:rgba(255,255,255,.08);color:#e8e4de}
.lightbox .prev{left:12px}
.lightbox .next{right:12px}
.lightbox .close{position:absolute;top:12px;right:16px;background:none;border:none;color:#555;font-size:1.6rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#e8e4de}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:.65rem;letter-spacing:.15em}

.footer{text-align:center;padding:30px;color:#605c56;font-size:.65rem;border-top:3px solid #555}
.footer a{color:#787470;text-decoration:none}
.footer a:hover{color:#e8e4de}
</style>
</head>
<body>
<div class="header">
  <div class="site-name">GR // PHOTO</div>
  <div class="meta">Portfolio &mdash; 64</div>
</div>

<div class="hero">
  <img alt="" src="../../photos/avif/hero.avif">
  <div class="hero-overlay">
    <div class="hero-content">
      <div class="tag">Featured</div>
      <h1>Gordon Rudman</h1>
      <p>Photography &mdash; capturing the raw and the refined</p>
    </div>
  </div>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
  &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const r=document.createElement('div');r.className='ref';r.textContent='GR-'+(i+1);
  c.append(img,r);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+'/'+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
