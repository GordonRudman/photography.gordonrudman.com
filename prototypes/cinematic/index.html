<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Raleway:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Raleway',sans-serif;font-weight:200;background:#0d0d0d;color:#e0ddd8;overflow-x:hidden}
.container{max-width:1400px;margin:0 auto}

.hero{position:relative;height:75vh;overflow:hidden;margin-bottom:0}
.hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.6) contrast(1.05)}
.hero .letterbox{position:absolute;inset:0;border-top:60px solid #000;border-bottom:60px solid #000;pointer-events:none}
.hero .hero-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:5rem;font-weight:400;color:#fff;letter-spacing:.08em;text-shadow:0 2px 40px rgba(0,0,0,.5)}
.hero p{font-size:.7rem;letter-spacing:.5em;text-transform:uppercase;color:#a09080;margin-top:8px;font-weight:400}
.hero .year{position:absolute;bottom:80px;right:40px;color:rgba(255,255,255,.2);font-size:.6rem;letter-spacing:.2em;font-family:'Raleway',sans-serif;font-weight:400}

.gallery{padding:0}
.gallery-row{display:flex;gap:0;overflow:hidden}
.gallery-item{flex:1;position:relative;cursor:pointer;overflow:hidden;background:#111;border-right:1px solid rgba(255,255,255,.02)}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;aspect-ratio:16/9;object-fit:cover;filter:contrast(1.05) brightness(.9);transition:all .5s ease}
.gallery-item:hover img{filter:contrast(1.1) brightness(1.05);transform:scale(1.05)}
.gallery-item .timecode{position:absolute;bottom:10px;right:12px;font-family:'Raleway',sans-serif;font-size:.5rem;font-weight:400;color:rgba(255,255,255,.3);letter-spacing:.05em;opacity:0;transition:.3s}
.gallery-item:hover .timecode{opacity:1}
.gallery-item .reel-mark{position:absolute;top:10px;left:10px;width:20px;height:20px;border:1px solid rgba(255,255,255,.1);border-radius:50%;opacity:0;transition:.3s}
.gallery-item:hover .reel-mark{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox .letterbox-frame{position:absolute;inset:0;border-top:50px solid #000;border-bottom:50px solid #000;pointer-events:none;z-index:1}
.lightbox img{max-width:100vw;max-height:100vh;object-fit:contain;z-index:2}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:none;color:rgba(255,255,255,.15);border:none;font-size:2.5rem;cursor:pointer;transition:.2s;z-index:3;font-weight:200;padding:20px}
.lightbox .nav:hover{color:rgba(255,255,255,.5)}
.lightbox .prev{left:0}
.lightbox .next{right:0}
.lightbox .close{position:absolute;top:20px;right:24px;background:none;border:none;color:rgba(255,255,255,.2);font-size:2rem;cursor:pointer;transition:.2s;z-index:3}
.lightbox .close:hover{color:#fff}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:.65rem;letter-spacing:.15em;z-index:3;font-weight:400}

.footer{text-align:center;padding:30px;color:#444;font-size:.65rem;border-top:1px solid #1a1a1a}
.footer a{color:#666;text-decoration:none}
.footer a:hover{color:#e0ddd8}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="letterbox"></div>
    <img alt="" src="../../photos/avif/hero.avif">
    <div class="hero-content">
      <h1>Gordon Rudman</h1>
      <p>Photography</p>
    </div>
    <div class="year">MMXXVI</div>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="letterbox-frame"></div>
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
const chunk=(a,s)=>{const r=[];for(let i=0;i<a.length;i+=s)r.push(a.slice(i,i+s));return r};
const rows=chunk(thumbs,5);
rows.forEach(row=>{
  const d=document.createElement('div');d.className='gallery-row';
  row.forEach((src,i)=>{
    const idx=thumbs.indexOf(src);
    const c=document.createElement('div');c.className='gallery-item';
    const img=document.createElement('img');img.src=src;img.dataset.full=fulls[idx];if(idx>=10)img.loading='lazy';
    const [w,h]=DIMS[p3(nums[idx])];img.style.aspectRatio='16/9';img.style.objectFit='cover';
    img.onload=()=>img.style.opacity='1';
    const tc=document.createElement('div');tc.className='timecode';tc.textContent='00:'+String(Math.floor(idx/60)).padStart(2,'0')+':'+String(idx%60).padStart(2,'0');
    const rm=document.createElement('div');rm.className='reel-mark';
    c.append(img,tc,rm);d.appendChild(c);
  });
  gal.appendChild(d);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery-item img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent='REEL '+(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
