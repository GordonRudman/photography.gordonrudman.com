<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brutalist — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Mono',monospace;background:#f5f5f0;color:#111;overflow-x:hidden;line-height:1.4}
.container{max-width:1200px;margin:0 auto;padding:0}

.hero{background:#111;color:#f5f5f0;padding:60px 30px;border-bottom:8px solid #ff3b30;margin-bottom:0}
.hero h1{font-size:3.5rem;font-weight:700;text-transform:uppercase;letter-spacing:-.02em;line-height:.9;margin-bottom:4px}
.hero .sub{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;font-weight:400;color:#888;margin-top:16px;text-transform:uppercase}
.hero .sub span:last-child{color:#ff3b30}

.nav-bar{display:flex;background:#fff;border-bottom:4px solid #111}
.nav-bar .item{padding:12px 24px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-right:2px solid #ddd;cursor:pointer;transition:.1s}
.nav-bar .item:hover{background:#111;color:#fff}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0;padding:0}
.gallery-item{position:relative;cursor:pointer;background:#e8e8e0;border:1px solid #ccc;transition:.1s}
.gallery-item:nth-child(3n){border-right:4px solid #ff3b30}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .4s ease;filter:contrast(1.05)}
.gallery-item .label{position:absolute;bottom:0;left:0;background:#111;color:#f5f5f0;font-size:.55rem;font-weight:600;padding:4px 8px;letter-spacing:.05em;opacity:0;transition:.1s}
.gallery-item:hover .label{opacity:1}
.gallery-item:hover{outline:3px solid #111;outline-offset:-3px;z-index:10}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#111;display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border:8px solid #f5f5f0}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:#fff;color:#111;border:none;font-size:1.4rem;width:48px;height:48px;cursor:pointer;transition:.1s;font-weight:700;font-family:'IBM Plex Mono',monospace;border-radius:0}
.lightbox .nav:hover{background:#ff3b30;color:#fff}
.lightbox .prev{left:0}
.lightbox .next{right:0}
.lightbox .close{position:absolute;top:0;right:0;background:#fff;color:#111;border:none;font-size:1.2rem;padding:12px 16px;cursor:pointer;transition:.1s;font-weight:700}
.lightbox .close:hover{background:#ff3b30;color:#fff}
.lightbox .counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#555;font-size:.65rem;font-weight:400}

.footer{text-align:center;padding:30px;color:#888;font-size:.65rem;border-top:4px solid #111;margin-top:0;text-transform:uppercase}
.footer a{color:#555;text-decoration:none}
.footer a:hover{color:#111;text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>Gordon<br>Rudman</h1>
    <div class="sub">
      <span>Photography Portfolio</span>
      <span>64 Images &darr;</span>
    </div>
  </div>
  <div class="nav-bar">
    <div class="item">All Work</div>
    <div class="item">Selected</div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">CLOSE</button>
  <button class="nav prev" id="lb-prev">&larr;</button>
  <button class="nav next" id="lb-next">&rarr;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const l=document.createElement('div');l.className='label';l.textContent='#'+String(nums[i]).padStart(3,'0');
  c.append(img,l);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
