<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery White — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Inter:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-weight:200;background:#fcfcf9;color:#1a1a1a;overflow-x:hidden;line-height:1.6}
.container{max-width:1300px;margin:0 auto;padding:0 30px}

.hero{display:flex;align-items:center;gap:60px;padding:60px 0;border-bottom:1px solid #e8e8e4}
.hero-image{flex:1;min-height:400px;overflow:hidden}
.hero-image img{width:100%;height:450px;object-fit:cover;filter:grayscale(20%)}
.hero-text{flex:1;padding:0 0 0 20px}
.hero-text .gallery-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.85rem;color:#b8b8b0;letter-spacing:.1em;margin-bottom:16px}
.hero-text h1{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:300;letter-spacing:-.01em;line-height:1.1;margin-bottom:12px}
.hero-text p{font-size:.85rem;color:#888;font-weight:200;max-width:360px}

.gallery{padding:30px 0 50px}
.gallery-row{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.gallery-item{flex:1;min-width:220px;cursor:pointer;background:#f5f5f0;transition:opacity .3s}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .6s ease;box-shadow:0 2px 20px rgba(0,0,0,.04)}
.gallery-item .frame{display:block;padding:12px 12px 40px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.gallery-item .frame img{box-shadow:none}
.gallery-item .title{font-size:.65rem;color:#b0b0a8;text-align:center;margin-top:8px;font-style:italic;font-family:'Cormorant Garamond',serif}
.gallery-item:hover{opacity:.85}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(30,30,28,.95);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.lightbox img{max-width:85vw;max-height:85vh;object-fit:contain;box-shadow:0 20px 80px rgba(0,0,0,.5)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.04);color:#c0c0b8;border:1px solid rgba(255,255,255,.06);font-size:1.5rem;width:48px;height:48px;border-radius:50%;cursor:pointer;transition:.2s}
.lightbox .nav:hover{background:rgba(255,255,255,.1);color:#fff}
.lightbox .prev{left:24px}
.lightbox .next{right:24px}
.lightbox .close{position:absolute;top:20px;right:24px;background:none;border:none;color:#888;font-size:2rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#fff}
.lightbox .counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:.7rem;font-family:'Cormorant Garamond',serif;font-style:italic}

.footer{text-align:center;padding:40px 0;color:#c0c0b8;font-size:.75rem;border-top:1px solid #e8e8e4}
.footer a{color:#a0a098;text-decoration:none}
.footer a:hover{color:#1a1a1a}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-image">
      <img alt="" src="../../photos/avif/hero.avif">
    </div>
    <div class="hero-text">
      <div class="gallery-name">Exhibition</div>
      <h1>Gordon Rudman</h1>
      <p>A curated collection of photographic works exploring light, texture, and the spaces between.</p>
    </div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
const rowify=(items,perRow)=>{let r=[];for(let i=0;i<items.length;i+=perRow)r.push(items.slice(i,i+perRow));return r};
const rows=rowify(thumbs,4);
rows.forEach(row=>{
  const div=document.createElement('div');div.className='gallery-row';
  row.forEach((src,i)=>{
    const idx=thumbs.indexOf(src);
    const c=document.createElement('div');c.className='gallery-item';
    const fr=document.createElement('div');fr.className='frame';
    const img=document.createElement('img');img.src=src;img.dataset.full=fulls[idx];if(idx>=10)img.loading='lazy';
    const [w,h]=DIMS[p3(nums[idx])];img.style.aspectRatio=w+'/'+h;
    img.onload=()=>img.style.opacity='1';
    const t=document.createElement('div');t.className='title';t.textContent='Untitled';
    fr.appendChild(img);c.append(fr,t);div.appendChild(c);
  });
  gal.appendChild(div);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery-item img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
