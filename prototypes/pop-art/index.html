<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop Art — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;font-weight:700;background:#fff;color:#111;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(45deg,rgba(255,200,0,.03),rgba(255,200,0,.03) 20px,rgba(255,50,50,.03) 20px,rgba(255,50,50,.03) 40px);pointer-events:none;z-index:9999}
.container{max-width:1200px;margin:0 auto;padding:0 16px}

.hero{background:linear-gradient(135deg,#ffcc00,#ff3333);margin:0 -16px;padding:60px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'POP!';position:absolute;top:-20px;right:20px;font-size:12rem;font-weight:900;color:rgba(255,255,255,.06);line-height:1;pointer-events:none}
.hero .burst{display:inline-block;font-size:2rem;animation:pulse 1.5s ease infinite;margin-bottom:4px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.hero h1{font-family:'Fredoka One',cursive;font-size:4rem;color:#fff;text-transform:uppercase;letter-spacing:-.02em;text-shadow:4px 4px 0 #0033cc,8px 8px 0 rgba(0,0,0,.1);line-height:1}
.hero p{font-size:.8rem;letter-spacing:.25em;color:rgba(255,255,255,.85);margin-top:8px;text-transform:uppercase;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.hero .dots{display:flex;gap:8px;justify-content:center;margin-top:16px}
.hero .dots span{width:12px;height:12px;border-radius:50%;display:inline-block}
.hero .dots span:nth-child(1){background:#0033cc}
.hero .dots span:nth-child(2){background:#fff}
.hero .dots span:nth-child(3){background:#ff3333}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:20px 0 50px}
.gallery-item{position:relative;cursor:pointer;overflow:hidden;border:4px solid #111;transition:all .15s ease;background:#f0f0f0}
.gallery-item:nth-child(3n){border-color:#ff3333}
.gallery-item:nth-child(5n){border-color:#0033cc}
.gallery-item:nth-child(7n){border-color:#ffcc00}
.gallery-item:hover{transform:rotate(1deg) scale(1.02);border-width:6px}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .4s ease;filter:contrast(1.1) saturate(1.3)}
.gallery-item .pop-label{position:absolute;bottom:0;left:0;right:0;background:#111;color:#fff;font-family:'Fredoka One',cursive;font-size:.6rem;padding:4px 8px;text-align:center;letter-spacing:.05em;text-transform:uppercase;opacity:0;transition:.2s}
.gallery-item:hover .pop-label{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.92);display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox img{max-width:84vw;max-height:82vh;object-fit:contain;border:8px solid #111;box-shadow:16px 16px 0 rgba(0,0,0,.08)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:#111;color:#fff;border:none;font-size:1.5rem;width:48px;height:48px;cursor:pointer;transition:.1s;font-family:'Fredoka One',cursive;border-radius:0}
.lightbox .nav:hover{background:#ff3333;transform:translateY(-50%) scale(.9)}
.lightbox .prev{left:12px}
.lightbox .next{right:12px}
.lightbox .close{position:absolute;top:12px;right:16px;background:#111;color:#fff;border:none;font-size:1.2rem;width:44px;height:44px;cursor:pointer;transition:.1s;font-family:'Fredoka One',cursive;border-radius:0}
.lightbox .close:hover{background:#ff3333}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#888;font-size:.7rem;font-family:'Montserrat',sans-serif;font-weight:700}

.footer{text-align:center;padding:30px;color:#bbb;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;border-top:4px solid #111}
.footer a{color:#888;text-decoration:none}
.footer a:hover{color:#ff3333}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="burst">&#9733;</div>
    <h1>Gordon Rudman</h1>
    <p>Photography</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">X</button>
  <button class="nav prev" id="lb-prev">&larr;</button>
  <button class="nav next" id="lb-next">&rarr;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const l=document.createElement('div');l.className='pop-label';l.textContent='\u2605 BOP!';
  c.append(img,l);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
