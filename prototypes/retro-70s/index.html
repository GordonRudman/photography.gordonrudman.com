<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro 70s — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Prompt',sans-serif;background:#f5e6d0;color:#3d2b1f;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4b898' fill-opacity='.08'%3E%3Ccircle cx='20' cy='20' r='16'/%3E%3Ccircle cx='60' cy='60' r='16'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.container{max-width:1100px;margin:0 auto;padding:0 20px}

.hero{text-align:center;padding:50px 20px 30px;position:relative}
.hero .groove{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.3em;color:#c08250;text-transform:uppercase;margin-bottom:20px}
.hero h1{font-family:'Syne',sans-serif;font-size:4rem;font-weight:800;text-transform:uppercase;letter-spacing:-.02em;color:#3d2b1f;line-height:1;margin-bottom:4px}
.hero h1 span{color:#c08250}
.hero p{font-family:'Prompt',sans-serif;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:#a08068;margin-top:6px}
.hero hr{width:100px;height:4px;background:linear-gradient(90deg,#c08250,#d4a870);border:none;margin:16px auto 0;border-radius:2px}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;padding:20px 0 50px}
.gallery-item{position:relative;cursor:pointer;background:#f0dcc4;border:3px solid #dcc4ac;border-radius:4px;overflow:hidden;transition:transform .3s,box-shadow .3s}
.gallery-item:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(61,43,31,.15);border-color:#c08250}
.gallery-item img{width:100%;display:block;opacity:0;transition:opacity .5s ease;filter:sepia(.4) saturate(1.2) hue-rotate(-10deg)}
.gallery-item .badge{position:absolute;top:6px;left:6px;background:#c08250;color:#f5e6d0;font-size:.5rem;font-weight:700;padding:2px 8px;letter-spacing:.1em;font-family:'Syne',sans-serif;opacity:0;transition:.3s}
.gallery-item:hover .badge{opacity:1}

.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,43,31,.92);display:none;align-items:center;justify-content:center;z-index:1000}
.lightbox img{max-width:88vw;max-height:86vh;object-fit:contain;border:8px solid #dcc4ac;border-radius:4px;filter:sepia(.3) saturate(1.1) hue-rotate(-5deg)}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(245,230,208,.1);color:#f5e6d0;border:2px solid rgba(245,230,208,.15);font-size:1.4rem;width:44px;height:44px;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif}
.lightbox .nav:hover{background:#c08250;color:#f5e6d0;border-color:#c08250}
.lightbox .prev{left:16px}
.lightbox .next{right:16px}
.lightbox .close{position:absolute;top:16px;right:20px;background:none;border:none;color:#a08068;font-size:2rem;cursor:pointer;transition:.2s}
.lightbox .close:hover{color:#f5e6d0}
.lightbox .counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:.65rem;letter-spacing:.15em;font-family:'Syne',sans-serif}

.footer{text-align:center;padding:30px;color:#b8a088;font-size:.7rem;border-top:2px solid #dcc4ac}
.footer a{color:#a08068;text-decoration:none}
.footer a:hover{color:#3d2b1f}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="groove">&#9834; Feel the Light &#9834;</div>
    <h1>Gordon<span>.</span>Rudman</h1>
    <p>Photography</p>
    <hr>
  </div>
  <div class="gallery" id="gallery"></div>
  <div class="footer">
    &copy; 2026 Gordon Rudman &middot; <a href="mailto:photography@gordonrudman.com">photography@gordonrudman.com</a>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
  <div class="counter" id="lb-counter"></div>
</div>

<script>
const TOTAL=64, siteOrigin=window.location.origin;
const DIMS={"001":[400,266],"002":[400,250],"003":[400,250],"004":[302,400],"005":[400,250],"006":[266,400],"007":[266,400],"008":[267,400],"009":[400,237],"010":[400,239],"011":[400,197],"012":[400,212],"013":[400,266],"014":[400,266],"015":[243,400],"016":[400,275],"017":[400,250],"018":[400,250],"019":[400,250],"020":[266,400],"021":[400,250],"022":[400,250],"023":[400,250],"024":[400,250],"025":[400,250],"026":[400,250],"027":[400,250],"028":[400,250],"029":[400,250],"030":[400,250],"031":[400,248],"032":[266,400],"033":[400,266],"034":[400,266],"035":[400,266],"036":[286,400],"037":[400,266],"038":[400,225],"039":[266,400],"040":[400,225],"041":[266,400],"042":[400,225],"043":[267,400],"044":[400,225],"045":[400,163],"046":[349,400],"047":[266,400],"048":[400,250],"049":[400,250],"050":[400,266],"051":[400,261],"052":[266,400],"053":[400,266],"054":[177,400],"055":[266,400],"056":[266,400],"057":[266,400],"058":[242,400],"059":[280,400],"060":[400,399],"061":[266,400],"062":[400,266],"063":[400,250],"064":[400,250]};
const nums=Array.from({length:TOTAL},(_,i)=>i+1);
for(let i=nums.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[nums[i],nums[j]]=[nums[j],nums[i]]}
const p3=n=>String(n).padStart(3,'0');
const thumbs=nums.map(n=>siteOrigin+'/thumbnails/'+p3(n)+'.avif');
const fulls=nums.map(n=>siteOrigin+'/photos/avif/'+p3(n)+'.avif');
const gal=document.getElementById('gallery');
thumbs.forEach((src,i)=>{
  const c=document.createElement('div');c.className='gallery-item';
  const img=document.createElement('img');img.src=src;img.dataset.full=fulls[i];if(i>=10)img.loading='lazy';
  const [w,h]=DIMS[p3(nums[i])];img.style.aspectRatio=w+'/'+h;
  img.onload=()=>img.style.opacity='1';
  const b=document.createElement('div');b.className='badge';b.textContent='\u2605 VOL.'+String(nums[i]).padStart(2,'0');
  c.append(img,b);gal.appendChild(c);
});
const lb=document.getElementById('lightbox'),lbi=document.getElementById('lightbox-img'),lbc=document.getElementById('lb-counter');
const imgs=[...document.querySelectorAll('.gallery img')];let idx=0;
function open(i){idx=i;lbi.src=imgs[i].dataset.full;lb.style.display='flex';lbc.textContent=(i+1)+' / '+imgs.length}
function close(){lb.style.display='none'}
function prev(){open((idx-1+imgs.length)%imgs.length)}
function next(){open((idx+1)%imgs.length)}
imgs.forEach((img,i)=>img.addEventListener('click',()=>open(i)));
lb.addEventListener('click',e=>{if(e.target===lb)close()});
document.getElementById('lb-close').onclick=close;
document.getElementById('lb-prev').onclick=prev;
document.getElementById('lb-next').onclick=next;
document.addEventListener('keydown',e=>{if(lb.style.display!=='flex')return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next()});
let tx=0;
lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
lb.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(d>50)prev();if(d<-50)next()});
</script>
</body>
</html>
