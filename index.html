<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gordon Rudman | Photography</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preload" as="image" href="/photos/avif/hero.avif">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f8f7f3;color:#111;overflow-x:hidden}
.container{max-width:1100px;margin:auto;padding:20px}
.hero-video{position:relative;width:100%;height:60vh;overflow:hidden;border-radius:20px;margin-bottom:30px}
.hero-video video{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center}
.hero-overlay h1{font-size:3rem;margin:0}
.hero-overlay p{font-size:1.2rem;margin-top:10px}
.gallery{column-count:1;column-gap:12px}
.gallery-item{position:relative;margin-bottom:12px;cursor:pointer;background:#ddd;overflow:hidden}
.gallery-item img{width:100%;display:block;box-shadow:0 6px 20px rgba(0,0,0,0.15)}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;border-radius:12px;opacity:0;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;pointer-events:none}
.gallery-item:hover .overlay{opacity:1}
@media(min-width:600px){.gallery{column-count:2}}
@media(min-width:900px){.gallery{column-count:3}}
@media(min-width:1200px){.container{max-width:1400px}.gallery{column-count:4}}
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s ease}
.lightbox img{width:100%;height:100%;object-fit:contain;transition:transform .6s ease;cursor:default}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);color:#fff;border:none;font-size:2rem;padding:12px 20px;cursor:pointer;border-radius:8px;transition:.3s;z-index:1001}
.lightbox .nav:hover{background:rgba(255,255,255,.25)}
.lightbox .prev{left:16px}
.lightbox .next{right:16px}
.lightbox .close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;z-index:1001;opacity:.6;transition:.3s}
.lightbox .close:hover{opacity:1}
.contact{background:#fff;padding:20px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,.15);text-align:center}
.contact-form{display:grid;gap:10px;margin-top:10px}
.contact input{padding:10px;border-radius:8px;border:1px solid #ccc}
.contact button{padding:10px;border:none;border-radius:8px;background:#2d6a4f;color:#fff;cursor:pointer}
.contact button:hover{background:#1b4332}
@media(min-width:768px){.contact-form{grid-template-columns:1fr 1fr auto}}
.booking{margin:20px 0;max-width:600px;height:350px;margin:auto;border-radius:12px;overflow:hidden}
.booking iframe{width:100%;height:100%;border:none}
.footer{text-align:center;color:#aaa;margin-top:40px}
</style>
</head>
<body>

<div class="container">

  <!-- Hero -->
  <div class="hero-video">
    <!-- <video autoplay muted loop playsinline>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video> -->
    <img alt="hero" src="/photos/avif/hero.avif" id="hero-img" style="width:100%;height:100%;object-fit:cover;">
    <div class="hero-overlay">
      <h1>Gordon Rudman</h1>
      <p>Photography</p>
    </div>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery"></div>
 
  <!-- Contact -->
  <!-- <div class="contact fade">
    <h3>Book a Session</h3>
    <div class="contact-form">
      <input id="name" placeholder="Your Name">
      <input id="email" placeholder="Your Email">
      <button id="btn">Book Now</button>
    </div>
    <p id="msg"></p>

    <div class="booking fade">
      <iframe src="https://calendly.com/my-calendly-link" title="Book a session"></iframe>
    </div>
  </div> -->

  <div class="footer">
    © 2026 Gordon Rudman
    <br/>
    <a href="mailto:photography@gordonrudman.com?subject=Photography">photography@gordonrudman.com</a>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="close" id="lb-close">&times;</button>
  <button class="nav prev" id="lb-prev">&lsaquo;</button>
  <button class="nav next" id="lb-next">&rsaquo;</button>
  <img id="lightbox-img">
</div>

<script defer src="script.js"></script>

</body>
</html>
